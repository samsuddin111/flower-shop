<!DOCTYPE html><html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Green Canvas Online Nursery</title>
<script src="https://cdn.tailwindcss.com"></script>
</head><body class="bg-gray-50"><!-- NAVBAR --><nav class="bg-white shadow sticky top-0 z-50">
  <div class="container mx-auto px-4 py-4 flex justify-between items-center">
    <h1 class="text-2xl font-bold text-green-700">🌿 GCO</h1><div class="hidden md:flex gap-6">
  <a href="#" class="hover:text-green-600">হোম</a>
  <a href="#shop" class="hover:text-green-600">দোকান</a>
</div>

<button onclick="openCart()" class="bg-black text-white px-4 py-2 rounded-full">
  🛒 Cart (<span id="cart-count">0</span>)
</button>

  </div>
</nav><!-- HERO --><section class="text-center py-16 bg-green-600 text-white">
  <h2 class="text-4xl font-bold mb-4">আপনার বাগান সাজান 🌱</h2>
  <p>সেরা মানের গাছ এখন আপনার দোরগোড়ায়</p>
</section><!-- USER INFO --><section class="p-6 max-w-xl mx-auto bg-white mt-6 rounded shadow">
  <input id="userName" placeholder="আপনার নাম" class="w-full border p-2 mb-2">
  <input id="userPhone" placeholder="ফোন" class="w-full border p-2 mb-2">
  <textarea id="userAddress" placeholder="ঠিকানা" class="w-full border p-2"></textarea>
</section><!-- SEARCH --><div class="max-w-xl mx-auto mt-6">
  <input id="searchBox" onkeyup="searchPlant()" placeholder="🔍 গাছ খুঁজুন" class="w-full p-3 border rounded">
</div><!-- PRODUCTS --><section id="shop" class="container mx-auto px-4 py-10">
  <div id="plant-grid" class="grid grid-cols-1 md:grid-cols-3 gap-6"></div>
</section><!-- CART --><div id="cartBox" class="fixed right-0 top-0 w-80 h-full bg-white shadow-lg p-4 hidden">
  <h2 class="text-xl font-bold">Cart</h2>
  <div id="cartItems"></div>
  <button onclick="checkout()" class="bg-green-600 text-white w-full mt-4 py-2">Checkout</button>
</div><!-- FIREBASE + SCRIPT --><script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBWDbhuXgmuxD_sUAIBb3QNeSy0YJBcOfg",
  authDomain: "green-canvas.firebaseapp.com",
  projectId: "green-canvas",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

async function loadProducts() {
  const querySnapshot = await getDocs(collection(db, "products"));
  const grid = document.getElementById("plant-grid");
  grid.innerHTML = "";

  querySnapshot.forEach(doc => {
    const p = doc.data();

    grid.innerHTML += `
      <div class="bg-white p-4 rounded shadow plant-item">
        <img src="${p.img}" class="h-40 w-full object-cover">
        <h3 class="text-lg font-bold mt-2">${p.name}</h3>
        <p class="text-green-600">৳ ${p.price}</p>

        <button onclick="addToCart('${p.name}','${p.price}','${p.img}')" class="bg-gray-200 w-full mt-2 py-1">Add</button>
        <button onclick="orderNow('${p.name}','${p.price}')" class="bg-green-600 text-white w-full mt-2 py-1">Buy</button>
      </div>
    `;
  });
}

loadProducts();
</script><script>
let cart = JSON.parse(localStorage.getItem("cart")) || [];

function addToCart(name, price, img) {
  cart.push({name, price, img});
  localStorage.setItem("cart", JSON.stringify(cart));
  renderCart();
}

function openCart(){
  document.getElementById("cartBox").classList.toggle("hidden");
  renderCart();
}

function renderCart(){
  let box = document.getElementById("cartItems");
  box.innerHTML="";
  cart.forEach(i=>{
    box.innerHTML += `<p>${i.name} - ৳${i.price}</p>`;
  });
  document.getElementById("cart-count").innerText = cart.length;
}

function checkout(){
  let msg = cart.map(i=>i.name+" ৳"+i.price).join("%0A");
  window.open("https://wa.me/91XXXXXXXXXX?text="+msg);
}

function orderNow(name,price){
  window.open(`https://wa.me/91XXXXXXXXXX?text=${name} ৳${price}`);
}

function searchPlant(){
  let val = document.getElementById("searchBox").value.toLowerCase();
  document.querySelectorAll(".plant-item").forEach(i=>{
    i.style.display = i.innerText.toLowerCase().includes(val)?"block":"none";
  });
}
</script></body>
</html>
