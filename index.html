<!DOCTYPE html><html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GCO Amazon Style</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100"><!-- NAV --><div class="bg-green-700 text-white p-4 flex justify-between">
<h1 class="font-bold">🌿 GCO</h1>
<button onclick="toggleCart()">🛒 Cart (<span id="cartCount">0</span>)</button>
</div><!-- PRODUCTS --><div id="products" class="grid grid-cols-2 md:grid-cols-4 gap-4 p-4"></div><!-- CART --><div id="cartBox" class="fixed right-0 top-0 w-80 h-full bg-white shadow hidden p-4 overflow-auto">
<h2 class="font-bold text-lg mb-4">Your Cart</h2>
<div id="cartItems"></div>
<h3 class="font-bold mt-4">Total: ₹ <span id="total">0</span></h3>
<button onclick="checkout()" class="bg-green-600 text-white w-full mt-4 py-2">Order Now</button>
</div><script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, getDocs, addDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBWDbhuXgmuxD_sUAIBb3QNeSy0YJBcOfg",
  authDomain: "green-canvas.firebaseapp.com",
  projectId: "green-canvas",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let cart = [];

async function loadProducts(){
const snap = await getDocs(collection(db,"products"));
let html='';
snap.forEach(doc=>{
let p = doc.data();
html+=`
<div class="bg-white p-3 rounded shadow">
<img src="${p.img}" class="h-32 w-full object-cover">
<h3>${p.name}</h3>
<p>₹ ${p.price}</p>
<button onclick="addToCart('${p.name}',${p.price})" class="bg-green-500 text-white w-full mt-2">Add</button>
</div>`;
});
document.getElementById('products').innerHTML = html;
}

window.addToCart = function(name,price){
let item = cart.find(i=>i.name===name);
if(item){item.qty++;}else{cart.push({name,price,qty:1});}
updateCart();
}

function updateCart(){
let html=''; let total=0; let count=0;
cart.forEach(i=>{
html+=`<div class='flex justify-between'>${i.name} x${i.qty}</div>`;
total+=i.price*i.qty; count+=i.qty;
});
document.getElementById('cartItems').innerHTML=html;
document.getElementById('total').innerText=total;
document.getElementById('cartCount').innerText=count;
}

window.toggleCart=function(){
document.getElementById('cartBox').classList.toggle('hidden');
}

window.checkout = async function(){
if(cart.length==0){alert('Cart empty');return;}
await addDoc(collection(db,"orders"),{cart,date:new Date()});
alert('Order Placed');
cart=[];updateCart();
}

loadProducts();
</script></body>
</html>
