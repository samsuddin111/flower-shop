<!DOCTYPE html><html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Green Canvas Online Nursery</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;500;600;700&display=swap" rel="stylesheet"><style>
body {font-family: 'Hind Siliguri', sans-serif;}
.plant-card:hover {transform: translateY(-8px);transition: 0.3s;}
.category-btn.active {background:#16a34a;color:#fff;}
</style></head><body class="bg-gray-50"><!-- NAVBAR --><nav class="bg-white shadow sticky top-0 z-50">
<div class="max-w-6xl mx-auto px-4 py-4 flex justify-between">
<h1 class="text-xl font-bold text-green-700">🌿 GCO</h1>
<a href="admin.html" class="text-sm bg-black text-white px-3 py-1 rounded">Admin</a>
</div>
</nav><!-- USER INFO --><div class="max-w-xl mx-auto bg-white p-6 mt-6 rounded shadow">
<h2 class="font-bold mb-3">Delivery Info</h2>
<input id="name" placeholder="Name" class="w-full border p-2 mb-2">
<input id="phone" placeholder="Phone" class="w-full border p-2 mb-2">
<textarea id="address" placeholder="Address" class="w-full border p-2 mb-2"></textarea>
<button onclick="saveUser()" class="bg-green-600 text-white px-4 py-2 w-full">Save</button>
</div><!-- PRODUCTS --><div id="productList" class="max-w-6xl mx-auto grid grid-cols-2 md:grid-cols-4 gap-4 mt-10"></div><script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBWDbhuXgmuxD_sUAIBb3QNeSy0YJBcOfg",
  authDomain: "green-canvas.firebaseapp.com",
  projectId: "green-canvas",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

async function loadProducts(){
const snap = await getDocs(collection(db,"products"));
let html='';
snap.forEach(doc=>{
let p = doc.data();
html+=`
<div class="bg-white p-3 rounded shadow plant-card">
<img src="${p.img}" class="h-40 w-full object-cover rounded">
<h3 class="font-bold mt-2">${p.name}</h3>
<p class="text-green-700 font-bold">₹ ${p.price}</p>
<button onclick="order('${p.name}','${p.price}')" class="bg-green-500 text-white px-2 py-1 mt-2 w-full">Order</button>
</div>`;
});
document.getElementById('productList').innerHTML = html;
}

window.order = function(name,price){
let user = JSON.parse(localStorage.getItem('user'));
if(!user){alert('Fill info first');return;}
let msg = `Order:%0A${name}%0APrice:${price}%0AName:${user.name}%0APhone:${user.phone}%0AAddress:${user.address}`;
window.open(`https://wa.me/919353544837?text=${msg}`);
}

window.saveUser = function(){
let user={
name:document.getElementById('name').value,
phone:document.getElementById('phone').value,
address:document.getElementById('address').value
};
localStorage.setItem('user',JSON.stringify(user));
alert('Saved');
}

loadProducts();
</script></body>
</html>
