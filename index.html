<!DOCTYPE html><html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Green Canvas Online</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100"><!-- Header --><div class="bg-green-700 text-white p-4 text-center text-2xl font-bold">
🌿 Green Canvas Online
</div><!-- User Form --><div class="max-w-xl mx-auto bg-white p-6 mt-6 rounded-xl shadow">
<h2 class="text-xl font-bold mb-4">আপনার তথ্য দিন</h2>
<input id="name" placeholder="আপনার নাম" class="w-full border p-2 mb-3 rounded" />
<input id="phone" placeholder="মোবাইল নাম্বার" class="w-full border p-2 mb-3 rounded" />
<textarea id="address" placeholder="ঠিকানা" class="w-full border p-2 mb-3 rounded"></textarea>
</div><!-- Category --><div class="max-w-6xl mx-auto mt-10">
<h2 class="text-2xl font-bold mb-4">ক্যাটাগরি</h2>
<div class="flex gap-4">
<button onclick="filter('flower')" class="bg-green-500 text-white px-4 py-2 rounded">ফুল গাছ</button>
<button onclick="filter('fruit')" class="bg-green-500 text-white px-4 py-2 rounded">ফল গাছ</button>
<button onclick="filter('all')" class="bg-gray-500 text-white px-4 py-2 rounded">সব</button>
</div>
</div><!-- Products --><div id="products" class="grid grid-cols-1 md:grid-cols-3 gap-6 max-w-6xl mx-auto mt-6"><div class="card flower bg-white p-4 rounded shadow">
<h3 class="font-bold">🌹 গোলাপ</h3>
<p>৳ 200</p>
<button onclick="order('গোলাপ','200')" class="bg-green-600 text-white px-3 py-1 mt-2 rounded">Order Now</button>
</div><div class="card fruit bg-white p-4 rounded shadow">
<h3 class="font-bold">🥭 আম গাছ</h3>
<p>৳ 350</p>
<button onclick="order('আম গাছ','350')" class="bg-green-600 text-white px-3 py-1 mt-2 rounded">Order Now</button>
</div></div><script>
const phone = "919353544837";

function order(product, price){
let name = document.getElementById('name').value;
let userPhone = document.getElementById('phone').value;
let address = document.getElementById('address').value;

if(!name || !userPhone || !address){
alert("সব তথ্য দিন");
return;
}

let msg = `নতুন অর্ডার:\n\nনাম: ${name}\nমোবাইল: ${userPhone}\nঠিকানা: ${address}\n\nপ্রোডাক্ট: ${product}\nদাম: ৳${price}`;

window.open(`https://wa.me/${phone}?text=${encodeURIComponent(msg)}`,'_blank');
}

function filter(type){
let cards = document.querySelectorAll('.card');
cards.forEach(c=>{
if(type==='all' || c.classList.contains(type)){
c.style.display='block';
}else{
c.style.display='none';
}
});
}
</script></body>
</html>
