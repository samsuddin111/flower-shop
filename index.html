```html
<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>পুষ্পাঞ্জলি নার্সারি - শামীম আহমেদ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Hind Siliguri', sans-serif; scroll-behavior: smooth; }
        .active-filter { background-color: #16a34a !important; color: white !important; }
        .hidden { display: none !important; }
        .admin-view-mode { display: none; }
        body.admin-mode .admin-view-mode { display: block; }
        body.admin-mode #shop-main { display: none; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800">

    <nav class="bg-white/95 backdrop-blur-md sticky top-0 z-50 border-b border-gray-100 shadow-sm">
        <div class="container mx-auto px-4 py-4 flex justify-between items-center">
            <div class="flex items-center gap-2">
                <span class="text-3xl">🌿</span>
                <h1 class="text-2xl font-bold text-green-700">পুষ্পাঞ্জলি</h1>
            </div>
            <button onclick="window.scrollToProfile()" class="bg-green-600 text-white px-5 py-2 rounded-xl text-sm font-bold shadow-md">অর্ডার প্রোফাইল</button>
        </div>
    </nav>

    <main id="shop-main">
        <header class="relative h-[250px] flex items-center justify-center text-center text-white overflow-hidden">
            <img src="https://images.unsplash.com/photo-1466692476868-aef1dfb1e735?auto=format&fit=crop&w=1600&q=80" class="absolute inset-0 w-full h-full object-cover z-0">
            <div class="absolute inset-0 bg-black/50 z-10"></div>
            <div class="relative z-20 px-4">
                <h2 class="text-3xl md:text-5xl font-extrabold mb-2">সতেজ বাগান আপনার ঘরে</h2>
                <p class="text-gray-200 text-sm">শামীম আহমেদ নার্সারি</p>
            </div>
        </header>

        <section id="profile-section" class="py-10 container mx-auto px-4">
            <div class="max-w-xl mx-auto bg-white p-8 rounded-[2.5rem] shadow-xl border">
                <h3 class="text-lg font-bold mb-6 text-green-800">📝 ডেলিভারি ঠিকানা সেভ করুন</h3>
                <div class="space-y-4">
                    <input id="uName" type="text" placeholder="আপনার নাম" class="w-full p-4 bg-gray-50 rounded-2xl border outline-none focus:ring-2 focus:ring-green-500">
                    <input id="uPhone" type="tel" placeholder="মোবাইল নাম্বার" class="w-full p-4 bg-gray-50 rounded-2xl border outline-none focus:ring-2 focus:ring-green-500">
                    <textarea id="uAddress" placeholder="পুরো ঠিকানা" rows="2" class="w-full p-4 bg-gray-50 rounded-2xl border outline-none focus:ring-2 focus:ring-green-500"></textarea>
                    <button onclick="window.saveUserProfile()" class="w-full bg-slate-900 text-white py-4 rounded-2xl font-bold active:scale-95 transition">তথ্য সেভ করুন ✅</button>
                </div>
            </div>
        </section>

        <section id="shop" class="py-12 container mx-auto px-4">
            <div id="product-list" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-8 min-h-[300px]">
                <div class="col-span-full text-center py-20 text-gray-400">লোডিং...</div>
            </div>
        </section>
    </main>

    <div id="admin-view" class="admin-view-mode container mx-auto px-4 py-12">
        <div id="admin-login-box" class="max-w-md mx-auto bg-white p-10 rounded-[3rem] shadow-2xl text-center border">
            <h2 class="text-2xl font-bold mb-6 text-gray-800">মালিক লগইন</h2>
            <input id="admin-password" type="password" placeholder="পাসওয়ার্ড দিন" class="w-full p-4 border rounded-2xl mb-6 text-center text-xl outline-none focus:ring-2 focus:ring-green-500">
            <div class="flex gap-3">
                <button onclick="window.hideAdmin()" class="flex-1 bg-gray-100 py-4 rounded-2xl font-bold">বাতিল</button>
                <button onclick="window.loginAdmin()" class="flex-[2] bg-green-600 text-white py-4 rounded-2xl font-bold shadow-lg">লগইন</button>
            </div>
        </div>

        <div id="admin-dashboard" class="hidden max-w-6xl mx-auto">
            <div class="flex justify-between items-center mb-10">
                <h2 class="text-3xl font-bold text-green-800">অ্যাডমিন ড্যাশবোর্ড</h2>
                <button onclick="window.hideAdmin()" class="bg-red-50 text-red-600 px-6 py-2 rounded-xl font-bold">বন্ধ করুন</button>
            </div>
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-10">
                <div class="bg-white p-8 rounded-[2.5rem] shadow-lg border">
                    <h3 class="font-bold mb-6 text-gray-800">নতুন গাছ যোগ</h3>
                    <div class="space-y-4">
                        <input id="p-img-url" type="text" placeholder="ছবির লিঙ্ক (Image URL)" class="w-full p-4 bg-gray-50 rounded-2xl border outline-none focus:border-green-500">
                        <input id="p-name" type="text" placeholder="গাছের নাম" class="w-full p-4 bg-gray-50 rounded-2xl border outline-none focus:border-green-500">
                        <input id="p-price" type="text" placeholder="দাম" class="w-full p-4 bg-gray-50 rounded-2xl border outline-none focus:border-green-500">
                        <select id="p-cat" class="w-full p-4 bg-gray-50 rounded-2xl border outline-none focus:border-green-500">
                            <option value="flower">🌸 ফুল গাছ</option>
                            <option value="fruit">🍎 ফল গাছ</option>
                            <option value="indoor">🏠 ইনডোর গাছ</option>
                        </select>
                        <button id="save-btn" onclick="window.saveToDB()" class="w-full bg-green-600 text-white py-5 rounded-2xl font-bold">যোগ করুন</button>
                    </div>
                </div>
                <div class="lg:col-span-2 bg-white p-8 rounded-[2.5rem] shadow-lg border">
                    <h3 class="font-bold mb-6 text-gray-800">বর্তমান স্টক</h3>
                    <div id="stock-list" class="space-y-4"></div>
                </div>
            </div>
        </div>
    </div>

    <footer class="bg-slate-900 text-gray-500 py-16 text-center mt-20 relative">
        <h3 class="text-white text-xl font-bold mb-2">🌿 পুষ্পাঞ্জলি নার্সারি</h3>
        <button onclick="window.showAdmin()" class="text-2xl opacity-20 hover:opacity-100 transition-all">🔒</button>
    </footer>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";

        const firebaseConfig = {
          apiKey: "AIzaSyBWDbhuXgmuxD_sUAIBb3QNeSy0YJBcOfg",
          authDomain: "green-canvas.firebaseapp.com",
          projectId: "green-canvas",
          storageBucket: "green-canvas.firebasestorage.app",
          messagingSenderId: "1043706925001",
          appId: "1:1043706925001:web:b14beb42dc7ec894fe6218"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const colPath = "pushpanjali_shamim_final";

        let allPlants = [];
        signInAnonymously(auth);

        onSnapshot(query(collection(db, colPath), orderBy("time", "desc")), (snapshot) => {
            allPlants = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
            window.renderShopUI();
            window.renderAdminStock();
        });

        window.showAdmin = () => { document.body.classList.add('admin-mode'); };
        window.hideAdmin = () => { 
            document.body.classList.remove('admin-mode');
            document.getElementById('admin-dashboard').classList.add('hidden');
            document.getElementById('admin-login-box').classList.remove('hidden');
        };

        window.loginAdmin = () => {
            const pass = document.getElementById('admin-password').value;
            if(pass === '1234') {
                document.getElementById('admin-login-box').classList.add('hidden');
                document.getElementById('admin-dashboard').classList.remove('hidden');
            } else {
                alert("ভুল পাসওয়ার্ড!");
            }
        };

        window.renderShopUI = () => {
            const container = document.getElementById('product-list');
            container.innerHTML = allPlants.length ? '' : '<p class="col-span-full text-center">স্টক খালি</p>';
            allPlants.forEach(p => {
                container.innerHTML += `
                <div class="bg-white p-4 rounded-[2.5rem] shadow-sm border flex flex-col h-full">
                    <img src="${p.img}" class="rounded-[2rem] aspect-[4/5] object-cover mb-4">
                    <h3 class="font-bold text-gray-800 mb-2">${p.name}</h3>
                    <div class="flex justify-between items-center mt-auto">
                        <span class="text-xl font-bold text-green-700">${p.price}</span>
                        <button onclick="window.orderWA('${p.id}')" class="bg-green-600 text-white px-4 py-2 rounded-xl text-sm font-bold">অর্ডার</button>
                    </div>
                </div>`;
            });
        };

        window.renderAdminStock = () => {
            const listEl = document.getElementById('stock-list');
            listEl.innerHTML = '';
            allPlants.forEach(p => {
                listEl.innerHTML += `
                <div class="flex items-center justify-between p-4 bg-gray-50 rounded-2xl border">
                    <div class="flex items-center gap-3">
                        <img src="${p.img}" class="w-12 h-12 rounded-xl object-cover">
                        <p class="font-bold text-sm">${p.name}</p>
                    </div>
                    <button onclick="window.deleteItem('${p.id}')" class="text-red-500 font-bold px-3 py-1">ডিলিট</button>
                </div>`;
            });
        };

        window.saveToDB = async () => {
            const n = document.getElementById('p-name').value;
            const p = document.getElementById('p-price').value;
            const img = document.getElementById('p-img-url').value;
            const c = document.getElementById('p-cat').value;
            if(!n || !p || !img) return alert("সব ঘর পূরণ করুন");
            await addDoc(collection(db, colPath), { name: n, price: p, img: img, category: c, time: serverTimestamp() });
            alert("সেভ হয়েছে");
        };

        window.deleteItem = async (id) => { if(confirm("ডিলিট?")) await deleteDoc(doc(db, colPath, id)); };

        window.orderWA = (id) => {
            const plant = allPlants.find(x => x.id === id);
            const uName = localStorage.getItem('p-name') || "Customer";
            window.open(`https://wa.me/919353544837?text=অর্ডার: ${plant.name}, দাম: ${plant.price}, ক্রেতা: ${uName}`, '_blank');
        };

        window.saveUserProfile = () => {
            localStorage.setItem('p-name', document.getElementById('uName').value);
            alert("সেভ হয়েছে");
        };

        window.scrollToProfile = () => document.getElementById('profile-section').scrollIntoView({behavior:'smooth'});

        window.onload = () => {
            document.getElementById('uName').value = localStorage.getItem('p-name') || '';
        };
    </script>
</body>
</html>


```
